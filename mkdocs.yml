          - Curve Comparison 1: examples/curves/curve_comparison1.md
          - Curve Comparison 2: examples/curves/curve_comparison2.md
          - Curve Divide: examples/curves/curve_divide.md
          - Curve From Circle: examples/curves/curve_from_circle.md
          - Curve From Ellipse: examples/curves/curve_from_ellipse.md
          - Curve From Interpolation: examples/curves/curve_from_interpolation.md
          - Curve From Line: examples/curves/curve_from_line.md
          - Curve From Parameters: examples/curves/curve_from_parameters.md
          - Curve From Points: examples/curves/curve_from_points.md
          - Curve Joining: examples/curves/curve_joining.md
