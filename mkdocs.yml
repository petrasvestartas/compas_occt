          - Brep Explorer: examples/breps/brep_explorer.md
          - Brep Fillet: examples/breps/brep_fillet.md
          - Brep From Booleans: examples/breps/brep_from_booleans.md
          - Brep From Extrusion: examples/breps/brep_from_extrusion.md
          - Brep From Loft: examples/breps/brep_from_loft.md
          - Brep From Mesh: examples/breps/brep_from_mesh.md
          - Brep From Shape: examples/breps/brep_from_shape.md
          - Brep Intersections: examples/breps/brep_intersections.md
          - Brep Overlap: examples/breps/brep_overlap.md
          - Brep Serialisation: examples/breps/brep_serialisation.md
          - Brep Merge Coplanar Faces: examples/breps/brep_simplify.md
          - Brep Slice: examples/breps/brep_slice.md
          - Brep Split: examples/breps/brep_split.md
          - Brep Step Attributes: examples/breps/brep_step_attributes.md
          - Brep Trim: examples/breps/brep_trim.md
          - Brep With Hole: examples/breps/brep_with_hole.md
          - Brep With Holes: examples/breps/brep_with_holes.md
          - Brep With Holes 2: examples/breps/brep_with_holes2.md
      - Curves:
