name: docs
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: ~/.cache
          restore-keys: |
            mkdocs-material-
      # mkdocstrings reads the API from the source in src/ (allow_inspection: false), so the
      # docs do NOT need the compiled OCCT extension built -- just the mkdocs tooling.
      - run: pip install compas mkdocs-material "mkdocstrings[python]" markdown-callouts mike
      # Deploy versioned docs with mike so the site is served under /latest/ (matching the
      # `extra.version.provider: mike` config in mkdocs.yml and the compas.dev convention),
      # with the root redirecting there. Plain `mkdocs gh-deploy` published a FLAT site at the
      # root with no /latest/ path -- which is why /latest/ returned 404.
      - run: git fetch origin gh-pages --depth=1 || true
      - run: mike deploy --push --update-aliases latest
      - run: mike set-default --push latest
