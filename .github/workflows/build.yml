name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'docs-only') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src tests

  build_wheels:
    name: cibuildwheel on ${{ matrix.platform }}
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: manylinux
          # Single Apple-Silicon runner cross-compiles BOTH x86_64 + arm64 wheels
          # (macos.archs in pyproject.toml), like compas_cgal. macos-13 (Intel) was
          # retired by GitHub in Dec 2025, so a dedicated Intel runner just queues forever.
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: windows
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install cibuildwheel
        run: pipx install cibuildwheel==2.23.1
      - name: Build wheels (also runs the test suite per pyproject test-command)
        run: cibuildwheel --output-dir wheelhouse .
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build SDist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
